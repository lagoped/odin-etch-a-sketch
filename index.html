<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Etch-A-Sketch</title>
</head>

<body>
    <div class="body">
        <div class="header">
            <div class="canvas-customization">
                <div class="canvas-resizing">
                    <label for="grid-size">Canvas dimension</label>
                    <input type="number" id="grid-size" name="grid-size" min="16" max="64" value="16">
                </div>
                <div class="canvas-options">
                    <div class="canvas-option">
                        <label for="grid-size">Color randomizer : </label>
                        <input type="checkbox" id="random-color" name="random-color">
                    </div>
                    <div class="canvas-option">
                        <label for="color-intensity-slider">Intensity of the color : </label>
                        <input type="range" id="color-intensity-slider" min="0.1" max="1" step="0.05" value="0.25">
                    </div>
                </div>
            </div>
            <div class="canvas-reset-button">
                <button onclick="resetCanvas()">Reset</button>
            </div>
        </div>

        <div class="content">
            <div class="canvas" id="canvas">

            </div>
        </div>
    </div>
</body>
<script src="scripts/canvas.js"></script>
<script src="scripts/canvas-drawing.js"></script>

</html>
